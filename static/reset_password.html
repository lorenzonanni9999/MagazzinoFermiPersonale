<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reimposta password | Magazzino Scolastico</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .reset-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }
    .reset-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--sh-modal);
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
    }
    .reset-logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: .04em;
      margin-bottom: 24px;
    }
    .reset-card h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    .reset-card p.sub {
      font-size: 13px;
      color: var(--text-faint);
      margin-bottom: 24px;
    }
    .reset-card .form-group { margin-bottom: 16px; }
    .reset-card .form-group label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--text-faint);
    }
    .reset-card .form-group input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }
    .reset-card .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }
    #reset-msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      display: none;
    }
    #reset-msg.ok  { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    #reset-msg.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; width: 100%; box-sizing: border-box; }
    .pw-eye {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 2px;
      color: #9ca3af; line-height: 1;
    }
    .pw-eye:hover { color: #374151; }
  </style>
</head>
<body>
<div class="reset-wrap">
  <div class="reset-card">
    <div class="reset-logo">Magazzino Scolastico</div>
    <h2>Reimposta la password</h2>
    <p class="sub">Scegli una nuova password per il tuo account.</p>

    <div id="reset-msg"></div>

    <div id="reset-form">
      <div class="form-group">
        <label>Nuova password</label>
        <div class="pw-wrap">
          <input type="password" id="new-pass" placeholder="Almeno 6 caratteri" autocomplete="new-password">
          <button type="button" class="pw-eye" onclick="togglePw('new-pass',this)" tabindex="-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>Conferma password</label>
        <div class="pw-wrap">
          <input type="password" id="confirm-pass" placeholder="Ripeti la password" autocomplete="new-password">
          <button type="button" class="pw-eye" onclick="togglePw('confirm-pass',this)" tabindex="-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="auth-primary" style="margin-top:4px" onclick="doReset()">Salva nuova password</button>
    </div>

    <div id="reset-done" style="display:none;text-align:center;padding-top:8px">
      <div style="font-size:36px;margin-bottom:12px">&#10003;</div>
      <p style="font-size:14px;color:var(--text)">Password aggiornata con successo.</p>
      <a href="/static/login.html" class="btn btn-primary" style="margin-top:16px;display:inline-block">Vai al login</a>
    </div>
  </div>
</div>

<script>
  const EYE_OPEN  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const EYE_CLOSE = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

  function togglePw(inputId, btn) {
    const inp = document.getElementById(inputId);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.innerHTML = show ? EYE_CLOSE : EYE_OPEN;
  }

  function getToken() {
    return new URLSearchParams(window.location.search).get("token") || "";
  }

  function showMsg(text, type) {
    const el = document.getElementById("reset-msg");
    el.textContent = text;
    el.className = type === "ok" ? "ok" : "err";
    el.style.display = "";
  }

  async function doReset() {
    const token = getToken();
    if (!token) { showMsg("Link non valido — manca il token.", "err"); return; }

    const pass = document.getElementById("new-pass").value;
    const conf = document.getElementById("confirm-pass").value;

    if (pass.length < 6) { showMsg("La password deve essere di almeno 6 caratteri.", "err"); return; }
    if (pass !== conf)    { showMsg("Le password non coincidono.", "err"); return; }

    const res = await fetch("/api/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, new_password: pass })
    });
    const data = await res.json();

    if (res.ok) {
      document.getElementById("reset-form").style.display = "none";
      document.getElementById("reset-msg").style.display = "none";
      document.getElementById("reset-done").style.display = "";
    } else {
      showMsg(data.error || "Errore durante il reset.", "err");
    }
  }

  // Controlla subito se il token è presente nell'URL
  window.addEventListener("DOMContentLoaded", () => {
    if (!getToken()) {
      showMsg("Link non valido o mancante. Chiedi all'amministratore un nuovo link.", "err");
      document.getElementById("reset-form").style.display = "none";
    }
  });
</script>
</body>
</html>
